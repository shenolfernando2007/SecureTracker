{% extends "layout.html" %}

{% block title %}
Initial Setup
{% endblock %}

{% block content %}
<!-- Centered auth container for first-time admin creation -->
<div class="auth-container">
    <div class="auth-card shadow">
        <h2 class="text-center mb-3">Create Administrator</h2>
        <p class="text-muted text-center mb-4">First time SecureTracker setup</p>

        <form method="POST">
            <!-- Full Name Input -->
            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input class="form-control" name="full_name" placeholder="John Doe" required>
            </div>

            <!-- Username Input -->
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input class="form-control" name="username" autocomplete="username" required>
            </div>

            <!-- Email Input -->
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input class="form-control" type="email" name="email" autocomplete="email" required>
            </div>

            <!-- Password Input -->
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input class="form-control" type="password" name="password" autocomplete="new-password" required>
            </div>

            <!-- Confirm Password Input -->
            <div class="mb-3">
                <label class="form-label">Confirm Password</label>
                <input class="form-control" type="password" name="confirmation" autocomplete="new-password" required>
            </div>

            <!-- Submit Button -->
            <button class="btn btn-dark w-100" type="submit">Create Admin</button>
        </form>
    </div>
</div>
{% endblock %}
