{% extends "layout.html" %}

{% block title %}
Register
{% endblock %}

{% block content %}
<div class="auth-container">

    <div class="auth-card shadow">

        <div class="text-center mb-4">
            <h2 class="fw-bold">
                🔐 SecureTracker
            </h2>
            <p class="text-muted">
                Case Management System
            </p>
        </div>

        <form method="POST">
            <div class="mb-3">
                <label class="form-label">
                    Full Name
                </label>
                <input type="text" class="form-control" name="full_name" placeholder="Enter your full name" required>
            </div>

            <div class="mb-3">
                <label class="form-label">
                    Username
                </label>
                <input type="text" class="form-control" name="username" placeholder="Choose a username" required>
            </div>

            <div class="mb-3">
                <label class="form-label">
                    Email
                </label>
                <input type="email" class="form-control" name="email" placeholder="Enter your email" required>
            </div>

            <div class="mb-3">
                <label class="form-label">
                    Password
                </label>
                <input type="password" class="form-control" name="password" placeholder="Create a password" required>
            </div>

            <div class="mb-3">
                <label class="form-label">
                    Confirm Password
                </label>
                <input type="password" class="form-control" name="confirmation" placeholder="Confirm your password"
                    required>
            </div>

            <button class="btn btn-dark w-100">
                Register
            </button>

        </form>

        <hr>

        <div class="text-center">
            <p class="mb-0">
                Already have an account?
                <a href="/login" class="text-decoration-none fw-bold">
                    Login here
                </a>
            </p>
        </div>

    </div>
    
</div>
{% endblock %}
